<!DOCTYPE html>

<title>USTED Scholar - Academic Setup</title>

                    "on-tertiary-container": "#f3f0ef",
                    "tertiary-fixed": "#e5e2e1",
                    "surface-container-highest": "#353535",
                    "error-container": "#93000a",
                    "on-tertiary-fixed-variant": "#474646",
                    "on-background": "#e5e2e1",
                    "on-secondary-fixed-variant": "#763300",
                    "tertiary-container": "#6e6d6d",
                    "tertiary": "#c9c6c5",

                    "surface-container-lowest": "#0e0e0e",
                    "surface-container-high": "#2a2a2a",

            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "sidebar-width": "280px",
                    "md": "24px",
                    "sidebar-collapsed": "80px",
                    "sm": "16px",
                    "xl": "64px",
                    "base": "4px",
                    "xs": "8px",
                    "lg": "32px",
                    "container-max": "1440px"
            },
            "fontFamily": {
                    "headline-md": ["Outfit"],

                    "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "title-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.1em", "fontWeight": "700"}]

          },
        },

<style>
        .glass-card {
            background: rgba(26, 26, 26, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .active-ring {
            box-shadow: 0 0 15px rgba(46, 91, 255, 0.3);
        }
        .sunset-glow {
            background: radial-gradient(circle at top right, rgba(255, 140, 0, 0.08), transparent 50%);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen pb-32">
<!-- TopAppBar -->
<header class="flex justify-between items-center px-6 py-4 w-full sticky top-0 z-30 bg-[#0A0A0A]/50 backdrop-blur-md border-b border-white/5">
<div class="flex items-center gap-3">
<span class="text-lg font-bold text-transparent bg-clip-text bg-gradient-to-r from-[#2E5BFF] to-[#FF8C00] font-headline-md">USTED Scholar</span>
</div>
<div class="flex items-center gap-4">
<button class="text-gray-400 hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined">notifications_active</span>
</button>
<div class="w-8 h-8 rounded-full border border-[#2E5BFF]/30 overflow-hidden">
<img class="w-full h-full object-cover" data-alt="close up portrait of a young African student scholar with a confident expression in a tech environment" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA-VkjhKwrD8xIQCiGtrkAB2TPNThjuTamss9v8-yeBoeiDDBxw2N_04uFMGJp5j_qbD4byxHKlPiP0Xx9NVqCDN5rMYMM4cT0aYlakFlM1G9Q8C8CAyf3lkSGTVt0cYYv0qH-ZQ4orizBtKHR0TFR8Sk_V1Wij9wVPDRyTBt7x_6cJ_gKJ0YhBhkVfJRbsnCxzJPubERNzyUgbUZxlipMpJlMQ7vtK6GzDt0QIzOMb5S5bFh8sPYuKf528TLsdf5BEjVdQ3LtzM5g"/>
</div>
</div>
</header>
<main class="px-6 pt-8 max-w-md mx-auto">
<!-- Progress Indicator -->
<div class="mb-10">
<div class="flex justify-between items-end mb-2">
<p class="font-label-caps text-label-caps text-on-surface-variant">STEP 1 OF 2</p>
<p class="font-title-sm text-title-sm text-primary">Academic Path</p>
</div>
<div class="h-1.5 w-full bg-surface-container rounded-full overflow-hidden">
<div class="h-full w-1/2 bg-primary-container shadow-[0_0_8px_rgba(46,91,255,0.6)]"></div>
</div>
</div>
<!-- Section: Select Your Level -->
<section class="mb-12">
<div class="mb-6">
<h1 class="font-headline-md text-headline-md text-on-surface mb-2">Select Your Level</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Tailor your workspace to your current academic year.</p>
</div>
<div class="grid grid-cols-2 gap-4">
<!-- Level 100 -->
<button class="glass-card sunset-glow p-6 rounded-xl text-left transition-all duration-200 active:scale-95 group relative overflow-hidden border-primary-container active-ring">
<div class="absolute top-0 right-0 p-2">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<span class="material-symbols-outlined text-primary mb-4 block" style="font-size: 32px;">school</span>
<h3 class="font-title-sm text-title-sm text-on-surface">Level 100</h3>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-1">Freshman</p>
</button>
<!-- Level 200 -->
<button class="glass-card p-6 rounded-xl text-left transition-all duration-200 active:scale-95 group border-white/5">
<span class="material-symbols-outlined text-on-surface-variant mb-4 block group-hover:text-primary transition-colors" style="font-size: 32px;">history_edu</span>
<h3 class="font-title-sm text-title-sm text-on-surface">Level 200</h3>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-1">Sophomore</p>
</button>
<!-- Level 300 -->
<button class="glass-card p-6 rounded-xl text-left transition-all duration-200 active:scale-95 group border-white/5">
<span class="material-symbols-outlined text-on-surface-variant mb-4 block group-hover:text-primary transition-colors" style="font-size: 32px;">psychology</span>
<h3 class="font-title-sm text-title-sm text-on-surface">Level 300</h3>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-1">Junior</p>
</button>
<!-- Level 400 -->
<button class="glass-card p-6 rounded-xl text-left transition-all duration-200 active:scale-95 group border-white/5">
<span class="material-symbols-outlined text-on-surface-variant mb-4 block group-hover:text-primary transition-colors" style="font-size: 32px;">military_tech</span>
<h3 class="font-title-sm text-title-sm text-on-surface">Level 400</h3>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-1">Senior</p>
</button>
</div>
</section>
<!-- Section: Academic Term -->
<section class="mb-12">
<div class="mb-6">
<h2 class="font-title-sm text-title-sm text-on-surface mb-2">Academic Term</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Choose your current semester.</p>
</div>
<div class="space-y-4">
<!-- First Semester -->
<button class="w-full glass-card p-5 rounded-xl flex items-center justify-between border-white/5 transition-all active:scale-[0.98]">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-lg bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">looks_one</span>
</div>
<div class="text-left">
<h4 class="font-title-sm text-body-md font-bold text-on-surface">First Semester</h4>
<p class="font-body-sm text-body-sm text-on-surface-variant">Core foundations and new modules</p>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
</button>
<!-- Second Semester -->
<button class="w-full glass-card p-5 rounded-xl flex items-center justify-between border-white/5 transition-all active:scale-[0.98]">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-lg bg-secondary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-secondary">looks_two</span>
</div>
<div class="text-left">
<h4 class="font-title-sm text-body-md font-bold text-on-surface">Second Semester</h4>
<p class="font-body-sm text-body-sm text-on-surface-variant">Advanced topics and final projects</p>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
</button>
</div>
</section>
<!-- CTA Action -->
<div class="mt-8">
<button class="w-full py-4 bg-primary-container text-white font-title-sm text-title-sm rounded-xl shadow-[0_4px_20px_rgba(46,91,255,0.4)] transition-all hover:opacity-90 active:scale-95">
                Confirm Selection
            </button>
<p class="text-center mt-4 font-body-sm text-on-surface-variant italic">
                Step 2 of 2: Curriculum Personalization
            </p>
</div>
</main>
<!-- BottomNavBar -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-6 pb-6 pt-3 bg-[#0A0A0A]/80 backdrop-blur-lg border-t border-white/10 shadow-[0_-4px_20px_rgba(0,0,0,0.5)]">
<!-- Home (Active) -->
<a class="flex flex-col items-center justify-center text-[#2E5BFF] bg-blue-500/10 rounded-xl px-4 py-1" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-['Outfit'] text-[10px] uppercase tracking-widest mt-1">Home</span>
</a>
<!-- Library -->
<a class="flex flex-col items-center justify-center text-gray-400 active:bg-white/5" href="#">
<span class="material-symbols-outlined">menu_book</span>
<span class="font-['Outfit'] text-[10px] uppercase tracking-widest mt-1">Library</span>
</a>
<!-- Profile -->
<a class="flex flex-col items-center justify-center text-gray-400 active:bg-white/5" href="#">
<span class="material-symbols-outlined">person</span>
<span class="font-['Outfit'] text-[10px] uppercase tracking-widest mt-1">Profile</span>
</a>
</nav>
</body></html>
